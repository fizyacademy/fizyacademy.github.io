<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fizyacademy | Authentication</title>

    <!-- Meta Description -->
    <meta name="description" content="انضم إلى fizyacademy وابدأ رحلتك في تعلم الفيزياء اونلاين. سجل حسابك الآن للوصول إلى دورات ودروس الفيزياء المفصلة.">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://alostaz222.github.io/auth">

    <!-- Open Graph Meta Tags for Social Media and SEO -->
    <meta property="og:url" content="https://fizyacademy.github.io/auth">
    <meta property="og:title" content="fizyacademy | Authentication">
    <meta property="og:description" content="انضم إلى fizyacademy وابدأ رحلتك في تعلم الفيزياء اونلاين. سجل حسابك الآن للوصول إلى دورات ودروس الفيزياء المفصلة.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="fizyacademy">

    <!-- Structured Data with JSON-LD -->
    <script type="application/ld+json">{
    "@context": "http://schema.org",
    "@type": "WebSite",
    "name": "fizyacademy",
    "url": "https://fizyacademy.github.io/auth",
    "description": "انضم إلى fizyacademy وابدأ رحلتك في تعلم الفيزياء اونلاين. سجل حسابك الآن للوصول إلى دورات ودروس الفيزياء المفصلة."
}</script>

    <!-- Stylesheets -->
    <link rel="stylesheet" type="text/css" href="./css/notification.css" />
    <link rel="stylesheet" type="text/css" href="./css/navbar.css" />
    <link rel="stylesheet" href="./css/auth.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body id="auth">
    <!-- Loader -->

    <special-loader></special-loader>

    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>

    <div class="popupContainer">
        <div class="counters">
            <div class="counter error" id="errorCounter">
                <i class="material-icons">error</i>
                <span>0</span>
            </div>
            <div class="counter info" id="infoCounter">
                <i class="material-icons">info</i>
                <span>0</span>
            </div>
            <div class="counter success" id="successCounter">
                <i class="material-icons">check_circle</i>
                <span>0</span>
            </div>
            <div class="counter warning" id="warningCounter">
                <i class="material-icons">warning</i>
                <span>0</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="auth" id="authContainer">

            <div class="welcome" id="welcome">
                <h1>انضم الى عائلة الأستاذ</h1>
            </div>

            <div class="container" id="container">
                <a class="logo" href="./">
                    <img src="./logo.png" alt="logo">
                </a>

                <div class="showButtons">
                    <button id="showSignUp">انشئ حسابًا</button>
                    <button id="showSignIn">تسجيل الدخول</button>
                </div>
            </div>

            <form id="signUpForm" class="form" autocomplete="on">
                <h2>انشئ حسابًا</h2>
                <span> (برجاء ادخال البيانات باللغة الاجليزية)</span>

                <input type="text" class="SInput" id="username" name="username" placeholder="اسم المستخدم">

                <select class="SInput" id="stage" name="stage" required>
                    <option value="stage" selected disabled>الصف الدراسي</option>
                    <optgroup label="المرحلة الابتدائية">
                        <option value="4pm">الصف الرابع الابتدائي</option>
                        <option value="5pm">الصف الخامس الابتدائي</option>
                        <option value="6pm">الصف السادس الابتدائي</option>
                    </optgroup>
                    <optgroup label="المرحلة الاعدادية">
                        <option value="1pp">الصف الأول الاعدادى</option>
                        <option value="2pp">الصف الثاني الاعدادى</option>
                        <option value="3pp">الصف الثالث الاعدادى</option>
                    </optgroup>
                    <optgroup label="المرحلة الثانوية">
                        <option value="1s">الصف الأول الثانوى</option>
                        <option value="2s">الصف الثاني الثانوى</option>
                        <option value="3s">الصف الثالث الثانوى</option>
                    </optgroup>
                </select>

                <input type="email" class="SInput" id="email" name="email" placeholder="البريد الإلكتروني">

                <div class="phoneContainer">
                    <input type="tel" class="SInput" id="phone" name="phone" placeholder="رقم الطالب">
                </div>

                <div class="phoneContainer">
                    <input type="tel" class="SInput" id="phone2" name="phone2" placeholder="رقم الأب">
                </div>

                <div class="passwordWrapper">
                    <input type="password" class="SInput" id="password1" name="password1" placeholder="كلمة السر">
                    <span class="togglePassword" data-target="password1">
                        <i class="material-icons">visibility_off</i>
                    </span>
                </div>

                <div class="passwordWrapper">
                    <input type="password" class="SInput" id="password2" name="password2" placeholder="اعد كتابة كلمة السر">
                    <span class="togglePassword" data-target="password2">
                        <i class="material-icons">visibility_off</i>
                    </span>
                </div>

                <p>لديك حساب؟ <a id="switchToLogin">تسجيل الدخول</a></p>
                <button type="submit" id="sign-up">انشاء</button>
            </form>

            <form id="signInForm" class="form" autocomplete="on">
                <h2>تسجيل الدخول</h2>
                <span> (برجاء ادخال البيانات باللغة الاجليزية)</span>

                <input type="text" class="LInput" id="authenticator" name="authenticator" placeholder="اسم المستخدم أو البريد الألكتروني">

                <div class="passwordWrapper">
                    <input type="password" class="LInput" id="password" name="password" placeholder="كلمة السر">
                    <span class="togglePassword" data-target="password">
                        <i class="material-icons">visibility_off</i>
                    </span>
                </div>

                <p>ليس لديك حساب؟ <a id="switchToSignUp">انشاء حساب</a></p>
                <button type="submit" id="sign-in">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"></script>
    <script src="./js/notification.js" type="module" defer></script>
    <script src="./js/navbar.js" type="module" defer></script>
    <script type="module" src="./js/auth.js"></script>
</body>

</html>
